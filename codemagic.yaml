workflows:
  ios-device-build:
    name: iOS device build, unsigned
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 14.21.3
      vars:
        IOS_DIR: jtydmhapp-cordova/platforms/ios
        XCODE_SCHEME: jtydmhapp
    cache:
      cache_paths:
        - $HOME/.npm
    scripts:
      - name: Verify checked out iOS sources
        script: |
          set -euxo pipefail
          git log -1 --oneline

          if grep -R -n -E '<netinet6/in6.h>|sa_family_t[[:space:]]+hostAddressFamily' "$IOS_DIR"; then
            echo "Legacy iOS SDK-incompatible source is still present. Make sure this build uses the latest main branch commit."
            exit 1
          fi
      - name: Prepare Cordova web assets
        script: |
          set -euxo pipefail

          if [ -f package-lock.json ]; then
            npm ci && npm run build || echo "Web rebuild failed; using committed jtydmhapp-cordova/www assets."
          fi

          if [ -d dist ] && [ -f dist/index.html ]; then
            rm -rf jtydmhapp-cordova/www
            mkdir -p jtydmhapp-cordova/www
            cp -R dist/. jtydmhapp-cordova/www/
          fi

          test -f jtydmhapp-cordova/www/index.html
          test -f "$IOS_DIR/platform_www/cordova.js"

          rm -rf "$IOS_DIR/www"
          mkdir -p "$IOS_DIR/www"
          cp -R jtydmhapp-cordova/www/. "$IOS_DIR/www/"
          cp -R "$IOS_DIR/platform_www/." "$IOS_DIR/www/"
      - name: Provide Cordova iOS build helper dependency
        script: |
          set -euxo pipefail
          mkdir -p "$IOS_DIR/node_modules/shelljs"
          cat > "$IOS_DIR/node_modules/shelljs/index.js" <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const childProcess = require('child_process');

          function normalizePaths(args) {
            return args.flat().filter(Boolean);
          }

          exports.rm = function rm(flags, ...paths) {
            const recursive = String(flags).includes('r');
            const force = String(flags).includes('f');
            for (const target of normalizePaths(paths)) {
              fs.rmSync(target, { recursive, force });
            }
            return { code: 0 };
          };

          exports.cp = function cp(flags, src, dest) {
            const source = src;
            let target = dest;
            if (fs.existsSync(dest) && fs.statSync(dest).isDirectory()) {
              target = path.join(dest, path.basename(source));
            }
            fs.copyFileSync(source, target);
            return { code: 0 };
          };

          exports.exec = function exec(command) {
            try {
              childProcess.execSync(command, { stdio: 'inherit', shell: '/bin/bash' });
              return { code: 0 };
            } catch (error) {
              return { code: typeof error.status === 'number' ? error.status : 1 };
            }
          };
          EOF
      - name: Build iOS app for device without signing
        script: |
          set -euxo pipefail
          mkdir -p "$CM_BUILD_DIR/build/ios_logs"
          xcodebuild \
            -project "$IOS_DIR/jtydmhapp.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build | tee "$CM_BUILD_DIR/build/ios_logs/xcodebuild-device.log"
    artifacts:
      - build/ios_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.appex
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.dSYM

