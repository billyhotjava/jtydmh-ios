    name: iOS enterprise IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 14.21.3
      ios_signing:
        distribution_type: enterprise
        bundle_identifier: com.eccl.jtmh
      vars:
        IOS_DIR: jtydmhapp-cordova/platforms/ios
        XCODE_SCHEME: jtydmhapp
